name = "runtime-tracker"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-04"

[build]
command = "cargo install -q worker-build && worker-build --release"

# ============ D1 SQL 数据库 ============
[[d1_databases]]
binding = "DB"
database_name = "runtime-tracker-db"
database_id = "your-database-id-here"

# ============ Workers KV ============
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id-here"

# ============ 环境变量 ============
[vars]
SECRET = "your-secret-key"
ADMIN_USER = "admin"
ADMIN_PASSWD = "admin"
DEFAULT_TIMEZONE_OFFSET = "8"
AI_SUMMARY_ENABLED = "true"
AI_API_URL = "https://api.openai.com/v1/chat/completions"
AI_API_KEY = ""
AI_MODEL = "gpt-4"
AI_MAX_TOKENS = "1000"
AI_PROMPT = ""
PUBLISH_ENABLED = "false"
PUBLISH_API_URL = ""
PUBLISH_API_KEY = ""
WEB_DEVICE_COUNT = "true"
WEB_COMMENT = "true"
WEB_SUMMARY = "true"
GISCUS_REPO = ""
GISCUS_REPOID = ""
GISCUS_CATEGORY = ""
GISCUS_CATEGORYID = ""
GISCUS_MAPPING = "pathname"
GISCUS_REACTIONSENABLED = "true"
GISCUS_EMITMETADATA = "false"
GISCUS_INPUTPOSITION = "bottom"
GISCUS_THEME = "light"
GISCUS_LANG = "zh-CN"

# ============ 定时触发 (AI 总结 Cron) ============
[triggers]
crons = ["0 */4 * * *"]
